# Forge — Render Blueprint (Vite SPA static site)
#
# IMPORTANT: Set all VITE_* environment variables in the Render Dashboard
# (Environment → Environment Variables) BEFORE the first build. Vite inlines
# them at compile time — changing them later requires a manual redeploy.
#
# Required at minimum: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_PAYSTACK_PUBLIC_KEY
# See .env.local.example for the full list.

services:
  - type: web
    runtime: static
    name: forge
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # Cache: hashed /assets/* are immutable; index.html + version.json must revalidate
    # after each deploy so clients pick up new builds (see public/_headers).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
